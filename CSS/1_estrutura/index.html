<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução ao CSS</title>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <style>
        /* Incorporado . Desvantagem: Se eu tiver mais de um arquivo HTML, será necessário duplicar*/
        h1{
            color: #0F0;
        }
    </style>
    
</head>
<body>
    <!-- Inline. Desvantagen: Não é possível replicar. Geralmente não é usado. Maior especificidade-->
    <h1 style="color: #F00;">Título</h1>
     <h1>Título</h1>
</body>
</html>
