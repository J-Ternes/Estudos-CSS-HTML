<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários em HTML</title>
    <style>
        label{
            margin: 10px 0;
            display: inline-block;
        }
    </style>
</head>
<body>
    <main>
        <section> <!--Separa os assuntos. Cada assunto é separado por sessão-->
            <form action="cadastro.java" name="cadastro" method="post">

                <fieldset id="dados-pessoais">

                    <legend>Dados Pessoais</legend>

                    <div id="nome">

                        <label for="name">Nome</label>

                        <input type="text" placeholder="Nome completo" required id="name">

                     </div>

                     <div id="email">

                        <label for="cp-email">Email</label>

                         <input type="email" id="cp-email" placeholder="Seu email" required>
                    </div>

                    <div id="WhatsApp">
                        <label for="">WhatsApp: </label>
                        <input type="tel" placeholder="00 12345-2345" required pattern="[0-9]{2} [0-9]{5}-[0-9]{4}">

                    </div>

                    <div id="genero">

                        <label for="">Gênero: </label>
                        <input type="radio" value="Masculino" name="genero"> <span>Masculino</span>
                        <input type="radio" value="Feminino" name="genero"> <span>Feminino</span>
                        <input type="radio" value="Outro" name="genero"> <span>Outro</span>

                    </div>

                    <div id="interesse">

                        <label for="">Área de Interesse: </label>
                        <input type="checkbox" name="interesse" value="ti"> <span>TI</span>
                        <input type="checkbox" name="interesse" value="financeiro"> <span>Financeiro</span>
                        <input type="checkbox" name="interesse" value="comercial"> <span>Comercial</span>

                    </div>

                    <div id="cidade">
                        <label for="cp-cidade">Cidade: </label>
                        <input type="text" placeholder="Cidade" required>
                    </div>

                    <div id="estado">
                        <label for="">Estado</label>
                        <select name="uf">
                            <option value="SantaCatarina">SC</option>
                            <option value="SaoPaulo">SP</option>
                            <option value="RioDeJaneiro">RJ</option>
                            <option value="MinasGerais">MG</option>
                        </select>
                    </div>

                    <div id="observacoes">

                        <label>Observações: </label>
                        <textarea rows="5"></textarea>

                    </div>

                </fieldset>

                <fieldset id="dados-pessoa-juridica">
                    <legend>Dados de Pessoa Jurídica</legend>

                    <div id="razao-social">
                        <label for="razaosocial">Razão Social</label>
                        <input type="text" id="razaosocial" placeholder="Razão Social" required>

                    </div>

                    <div id="nome-fantasia">
                        <label for="nomefantasia">Nome Fantasia</label>
                        <input type="text" id="nomefantasia" placeholder="Nome Fantasia" required>

                    </div>

                     <div id="cnpj">
                        <label for="cp-cnpj">CNPJ</label>
                        <input type="text" id="cp-cnpj" placeholder="CNPJ" required>

                    </div>

                       <div id="ie">
                        <label for="cp-ie">Inscrição Estadual</label>
                        <input type="text" id="cp-ie" placeholder="Inscrição Estadual" required>

                        <input type="checkbox" value="isento-ie"> <span>Isento de Inscrição Estadual</span>

                    </div>

                </fieldset>

                <input type="submit" value="Cadastrar">
            </form>
        </section>
    </main>
</body>
</html>
