<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        table,th,td{
            border: 1px solid #AAA;

        }
    </style>
</head>
<body>
    <main>
        <section>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Curso</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Jonathan</td>
                        <td>HTML</td>
                        <td>Aprovado</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Jonathan</td>
                        <td>CSS</td>
                        <td>Aprovado</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Jonathan</td>
                        <td>JavaScript</td>
                        <td>Aprovado</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td>Curso FrontEnd</td>
                        <td>Depois BackEnd</td>
                    </tr>
                </tfoot>
            </table>
        </section>
    </main>
</body>
</html>
